<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 LoveChat - Sayangku 💕</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="data:application/manifest+json,{
      \"name\": \"LoveChat - Sayangku 💕\",
      \"short_name\": \"LoveChat\",
      \"icons\": [{
        \"src\": \"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9Ijk2IiBjeT0iOTYiIHI9Ijk2IiBmaWxsPSIjRkY2QjZCIi8+CjxwYXRoIGQ9Ik0xMjAgODBDMTIwIDY5LjQ0OCA5MC41NTIgNDAgNjAgNDBDNS40NDg0IDQwIDAgNDQuNDQ4NCAwIDYwVjEyMEMwIDEzNS41NTIgNTYuNDQ4NCAxOTIgMTkyIDE5MkwxOTIgMTkyQzIxNS41NTIgMTkyIDI1MiAxNTUuNTUyIDI1MiAxNDBWMzZDMjUyIDIwLjc1MiAyMzEuMjQ4IDAgMjE2IDBDMTk2LjQ1NiAwIDE4MCAxNy4yMTYgMTgwIDM2TDE4MCA4MFoiIGZpbGw9IiNGRiIgLz4KPC9zdmc+\",
        \"sizes\": \"192x192\", \"type\": \"image/svg+xml\"
      }],
      \"theme_color\": \"#ff6b6b\",
      \"background_color\": \"#fecfef\",
      \"display\": \"standalone\"
    }">
    <meta name="theme-color" content="#ff6b6b">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="top-nav">
            <div class="nav-item active" data-tab="chat">
                <i class="fas fa-comments"></i>
                <span>Chat</span>
            </div>
            <div class="nav-item" data-tab="photos">
                <i class="fas fa-heart"></i>
                <span>Foto</span>
            </div>
            <div class="nav-item" data-tab="game">
                <i class="fas fa-gamepad"></i>
                <span>Game</span>
            </div>
        </nav>

        <!-- CHAT TAB -->
        <div class="tab-content active" id="chatTab">
            <header class="header">
                <div class="love-bubble">
                    <i class="fas fa-heart"></i> LoveChat
                </div>
                <div class="status">
                    <span id="onlineStatus">🟢 Online</span>
                    <span id="typingIndicator"></span>
                </div>
            </header>
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <div class="heart-float"><i class="fas fa-heart"></i></div>
                    <h1>💖 Halo Sayang! 💖</h1>
                    <p>Ketik pesan pertama yuk 😘</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Ketik pesan buat sayang... 💕">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="quick-emojis">
                    <button class="emoji-btn" data-emoji="😘">😘</button>
                    <button class="emoji-btn" data-emoji="💕">💕</button>
                    <button class="emoji-btn" data-emoji="🥰">🥰</button>
                    <button class="emoji-btn" data-emoji="❤️">❤️</button>
                </div>
            </div>
        </div>

        <!-- PHOTOS TAB -->
        <div class="tab-content" id="photosTab">
            <div class="photos-header">
                <h2>📸 Galeri Cinta Kita 💕</h2>
                <label for="photoUpload" class="upload-btn">
                    <i class="fas fa-camera"></i> Upload Foto
                </label>
                <input type="file" id="photoUpload" accept="image/*" multiple style="display:none;">
            </div>
            <div class="photos-grid" id="photosGrid"></div>
        </div>

        <!-- GAME TAB -->
        <div class="tab-content" id="gameTab">
            <div class="game-header">
                <h2>🧮 Math Tetris 💕</h2>
                <div class="game-stats">
                    <span>Score: <span id="gameScore">0</span></span>
                    <span>Level: <span id="gameLevel">1</span></span>
                </div>
                <div class="game-controls">
                    <button id="gameStart">🚀 Mulai</button>
                    <button id="gamePause">⏸️ Pause</button>
                </div>
            </div>
            <canvas id="tetrisCanvas" width="300" height="500"></canvas>
            <div style="text-align:center;margin-top:10px;color:#ff6b6b;">
                <strong>HP:</strong> Swipe ←→↓ | Double Tap = Rotate
            </div>
        </div>

        <div class="floating-hearts" id="floatingHearts"></div>
    </div>

    <script src="math-tetris.js"></script>
    <script src="script.js"></script>
</body>
</html>
